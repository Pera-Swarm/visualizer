name: Build Test

on:
    pull_request:
        branches: [main]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js from .nvmrc
              uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc

            - run: npm ci

            - name: Build the repository
              run: npm run build
